<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Criptografia por Matrizes - Projeto ED 1</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <div class="container">
        <h1>Codificador de Matrizes 5x5</h1>
        <p>Insira uma mensagem de até 25 caracteres:</p>
        
        <div class="input-group">
            <input type="text" id="inputMensagem" maxlength="25" placeholder="Ex: PUXA VIDA">
            <button onclick="processar()">Codificar Mensagem</button>
        </div>

        <div class="results">
            <section>
                <h3>Matriz da Mensagem (M)</h3>
                <div id="gridMensagem" class="matrix-grid"></div>
            </section>

            <section>
                <h3>Resultado Codificado (M &times; C)</h3>
                <div id="gridResultado" class="matrix-grid"></div>
                <p><strong>Cadeia de transmissão:</strong></p>
                <div id="stringTransmitida" class="code-box"></div>
            </section>
        </div>
    </div>
    <script src="index.js"></script>
</body>
</html>
