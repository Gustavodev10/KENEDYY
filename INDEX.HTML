<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Terremotos</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            background: #f1f1f1;
            display: flex;
            justify-content: center;
            padding-top: 40px;
        }

        .container {
            background: white;
            width: 400px;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 0 12px rgba(0,0,0,0.2);
        }

        h1 {
            margin-bottom: 15px;
            text-align: center;
        }

        .form {
            margin-top: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        input {
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        button {
            padding: 10px;
            background: #2196F3;
            color: white;
            font-weight: bold;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #0b7dda;
        }

        .resultado {
            margin-top: 20px;
            padding: 15px;
            background: #e7f3fe;
            border-left: 4px solid #2196F3;
            border-radius: 5px;
            display: none;
        }
    </style>

</head>
<body>

    <div class="container">
        <h1>Calculadora de Terremotos</h1>
        <p>Digite os valores abaixo para calcular a magnitude e a energia liberada.</p>

        <div class="form">
            <label for="amplitude">Amplitude (A) em mm:</label>
            <input type="number" id="amplitude" placeholder="Ex.: 12" step="0.01">

            <label for="dt">Distância Δt (mm) entre ondas P e S:</label>
            <input type="number" id="dt" placeholder="Ex.: 24" step="0.01">

            <button onclick="calcular()">Calcular</button>
        </div>

        <div id="resultado" class="resultado"></div>
    </div>

    <script>
        function calcular() {
            const A = parseFloat(document.getElementById("amplitude").value);
            const dt = parseFloat(document.getElementById("dt").value);
            const resultado = document.getElementById("resultado");

            if (isNaN(A) || isNaN(dt) || A <= 0 || dt <= 0) {
                resultado.style.display = "block";
                resultado.innerHTML = "<strong>Por favor, preencha os valores corretamente.</strong>";
                return;
            }

            // Fórmula da magnitude
            const M = Math.log10(A / 0.001) + 3 * Math.log10(8 * dt);

            // Energia liberada
            const E = 0.007 * Math.pow(10, 1.5 * M);

            // Classificação
            let efeito = "";

            if (M < 3.5) {
                efeito = "Geralmente não é sentido.";
            } else if (M < 5.5) {
                efeito = "Às vezes é sentido, mas raramente causa danos.";
            } else if (M < 6.1) {
                efeito = "Pode causar pequenos danos.";
            } else if (M < 7) {
                efeito = "Pode causar danos sérios em áreas densamente povoadas.";
            } else if (M < 8) {
                efeito = "Grande terremoto, causa danos extensos.";
            } else {
                efeito = "Extremamente destrutivo.";
            }

            resultado.style.display = "block";

            resultado.innerHTML = `
                <strong>Magnitude (M):</strong> ${M.toFixed(2)}<br>
                <strong>Energia liberada:</strong> ${E.toFixed(0)} kWh<br>
                <strong>Efeitos:</strong> ${efeito}
            `;
        }
    </script>

</body>
</html>
